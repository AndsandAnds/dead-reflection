# Pinned by commit SHA (not by tag) so a tag mutation upstream can't change
# what `pre-commit autoupdate` will silently fast-forward to. The trailing
# `# frozen: vX.Y.Z` comment is the convention `pre-commit autoupdate
# --freeze` writes, so re-running that command will keep the SHA-pin shape.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # frozen: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: f0b5944bef86f50d875305821a0ab0d8c601e465  # frozen: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: f12edd9c7be1c20cfa42420fd0e6df71e42b51ea  # frozen: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: ["--write"]
        files: "\\.(js|jsx|ts|tsx|json|md|yaml|yml|css|scss)$"
